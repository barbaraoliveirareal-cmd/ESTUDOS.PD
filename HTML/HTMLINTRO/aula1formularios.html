<!DOCTYPE html>
<html lang="en">
<head>
  <title>FORMS</title>
</head>
<body>
    <h1>FORMULÁRIOS</h1>
    <form action="pagina_destino.html" method="POST">
       
      <p>  
        <label for="login"> E-mail:</label>
        <input type="text" placeholder="Digite seu e-mail..." id="login"/>
      </p>
      
      <p>
        <label for="senha"> Senha:</label>
        <input type="password" placeholder="Digite sua senha..." id="senha"/> 
      </p>

      <p>
        Estado civil:
        <input type="radio" id="solteiro" name="estado civil" />
        <label for="solteiro">Solteiro</label>

        <input type="radio" id="casado" name="estado civil"/>
        <label for="casado">Casado</label>

        <input type="radio" id="divorciado" name="estado civil"/>
        <label for="divorciado">Divorciado</label>

      </p>

      <p>
         <input type= "checkbox" id="termos"/>
         <label for="termos">Concordo com os termos de uso</label>
      </p>
 
      <p> 
          Estado:
          <select>
           <option>Minas Gerais</option>
           <option>São Paulo</option>
           <option>Rio de Janeiro</option>

          </select>

      </p>



      <input type="submit" value="Log in">

    </form>
</body>
</html>
